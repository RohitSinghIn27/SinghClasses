<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | SinghClasses</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1; 
            --secondary: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column; /* Fixed: Forces dashboard card and back button to stack vertically */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .contact-container {
            background: var(--card-bg);
            max-width: 1000px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            display: grid;
            grid-template-columns: 1.2fr 1.8fr;
            overflow: hidden;
        }

        /* Left Side Panel: Meta Info */
        .info-section {
            background: var(--primary);
            color: white;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .info-section h2 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .info-section p {
            line-height: 1.6;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .contact-method {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            text-decoration: none;
            color: white;
            transition: transform 0.2s;
        }

        .contact-method:hover {
            transform: translateX(10px);
        }

        .icon-box {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            font-size: 1.2rem;
        }

        /* Right Side Panel: Interactive Form */
        .form-section {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-family: inherit;
            transition: all 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }

        button:hover {
            background: var(--secondary);
        }

        #status-msg {
            margin-top: 15px;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            padding: 12px 20px;
            background: #2563eb;
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            background: #1e4ed8;
            transform: translateY(-2px);
        }

        /* Responsive Breakpoints */
        @media (max-width: 768px) {
            .contact-container {
                grid-template-columns: 1fr;
            }
            .info-section {
                padding: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="contact-container">
        <div class="info-section">
            <div>
                <h2>Let’s Talk!</h2>
                <p>Whether you have a question about a Python tutorial, need database clarification, or want to join our classes—we’re here to help.</p>
                
                <a href="mailto:beyondsyntaxcode@gmail.com" class="contact-method">
                    <div class="icon-box"><i class="fa-solid fa-envelope"></i></div>
                    <div>
                        <strong>Email Us</strong><br>
                        <small>beyondsyntaxcode@gmail.com</small>
                    </div>
                </a>

                <a href="https://www.youtube.com/@ComputerScienceByRohitSingh" target="_blank" class="contact-method">
                    <div class="icon-box"><i class="fa-brands fa-youtube"></i></div>
                    <div>
                        <strong>YouTube</strong><br>
                        <small>Latest video lectures</small>
                    </div>
                </a>
            </div>
            
            <p style="font-size: 0.8rem; margin-bottom: 0;">* We aim to respond within 48 hours.</p>
        </div>

        <div class="form-section">
            <form id="contactForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" id="subject" placeholder="Python Help / Inquiry" required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea id="message" rows="4" placeholder="How can we help you?" required></textarea>
                </div>
                <button type="submit" id="submitBtn">Send Message</button>
                <p id="status-msg"></p>
            </form>
        </div>
    </div>

    <a href="index.html" class="btn-home">
        ← Back to Home
    </a>

    <script>
        const form = document.getElementById('contactForm');
        const statusMsg = document.getElementById('status-msg');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // UI Feedback
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Sending...";
            btn.style.opacity = "0.7";
            btn.disabled = true;

            // Simulate an API call runtime framework execution
            setTimeout(() => {
                btn.innerText = "Send Message";
                btn.style.opacity = "1";
                btn.disabled = false;
                
                statusMsg.style.display = "block";
                statusMsg.style.color = "#10b981";
                statusMsg.innerText = "Success! We'll get back to you soon.";
                
                form.reset();
            }, 1500);
        });
    </script>
</body>
</html>
