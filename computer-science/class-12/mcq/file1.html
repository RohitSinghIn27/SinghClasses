<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading Mock Test Environment...</title>

    <script>
        // Global Profile Configuration Block
        window.CBT_CONFIG = {
            // 📌 CORRECTED RELATIVE PATH TO CORE ENGINE
            // Goes up 3 levels (mcq -> class-12 -> computer-science -> root) then down into material
            CORE_ENGINE_PATH: "../../../material/mcq/file2.html", 

            // 1. SEO & Browser Window Metadata
            PAGE_TITLE: "DataFrames in Python Pandas MCQs | Class 12 IP CBSE",
            META_DESCRIPTION: "Prepare for CBSE Class 12 Informatics Practices with our interactive Python Pandas DataFrames MCQs. Practice mock tests, assertion-reasoning, and score high!",
            META_KEYWORDS: "Python Pandas DataFrames MCQs, Class 12 Informatics Practices MCQs, CBSE Class 12 IP Pandas questions, Pandas DataFrame loc iloc MCQs, Assertion Reasoning Pandas Class 12, SinghClasses Mock Test",
            OG_TITLE: "Python Pandas DataFrames MCQs - Interactive CBT Mock Test",
            OG_DESCRIPTION: "Master Pandas DataFrames for CBSE Class 12 IP! Take our interactive mock test featuring MCQs and Assertion-Reasoning questions.",

            // 2. Chapter Content Properties
            CHAPTER_NAME: "DataFrames in Python Pandas",
            DRIVE_ID: "14ycSzPcKX20mBGdY9kdfNp31fp6LNSYW",
            WELCOME_TOPIC: "Getting Started with Python",

            // 3. Evaluation & Marking Matrix Profiles
            MARKS_CORRECT: 5,
            MARKS_INCORRECT: 1,
            PENALTY_WARNING: 2,

            // 4. Integrations & Endpoint Channels
            SHEET_API_URL: "https://script.google.com/macros/s/AKfycbxfXaMeYe3GuWsDkzng4sjLzGUlsJRaC0JhWbT8Go01Wd7gnSUMRmnPYLeVW4idvmVjKw/exec",
            FORM_SAVE_URL: "https://docs.google.com/forms/d/e/1FAIpQLSdnW69EYJ2DElon7vZEF_Pcuz7tN_cOQ5CqTOjOPSeMTg-4sw/formResponse",
            HOME_URL: "https://www.singhclasses.in/",
            YOUTUBE_URL: "https://youtu.be/oMVmJxwX5yU",
            NOTES_URL: "https://singhclasses.in/computer-science/class-12/notes/function-in-python.html" 
        };

        // Dynamically request and inject using the path specified above
        fetch(window.CBT_CONFIG.CORE_ENGINE_PATH)
            .then(response => {
                if (!response.ok) throw new Error(`CBT core file could not be found at: ${window.CBT_CONFIG.CORE_ENGINE_PATH}`);
                return response.text();
            })
            .then(html => {
                // Convert configuration into an executable string payload to survive document reset
                const scriptPayload = `<script>window.CBT_CONFIG = ${JSON.stringify(window.CBT_CONFIG)};<\/script>`;
                
                // Inject configuration directly into the head tag
                const hydratedHtml = html.replace('<head>', '<head>\n' + scriptPayload);

                // Render out the layout stream
                document.open();
                document.write(hydratedHtml);
                document.close();
            })
            .catch(error => {
                console.error('Initialization error:', error);
                document.body.innerHTML = `
                    <div style="font-family: system-ui, sans-serif; text-align: center; padding: 50px; color: #dc2626; background: #fff;">
                        <h3>System Configuration Error</h3>
                        <p>Failed to find or load the application engine from: <strong>${window.CBT_CONFIG.CORE_ENGINE_PATH}</strong></p>
                        <p style="color: #6b7280; font-size: 0.85rem;">Verify that file2.html is saved correctly inside your <strong>material/mcq/</strong> directory.</p>
                    </div>`;
            });
    </script>
</head>
<body>
    <div style="display: flex; height: 100vh; align-items: center; justify-content: center; font-family: system-ui, sans-serif; background: #f9fafb; color: #4b5563;">
        <div style="text-align: center;">
            <div style="width: 28px; height: 28px; border: 3px solid #e5e7eb; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px;"></div>
            <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
            <p style="font-weight: 500; font-size: 0.95rem;">Mounting Core CBT Template...</p>
        </div>
    </div>
</body>
</html>
