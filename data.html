<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Lectures | SinghClasses</title>
<meta name="description" content="Watch video lectures for CBSE Class 12 Computer Science at SinghClasses.in">
<meta name="referrer" content="strict-origin-when-cross-origin">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--app-bg:#0F172A;--panel-bg:#1E293B;--primary-blue:#2563EB;--primary-blue-hover:#1D4ED8;--border-color:#334155;--text-main:#F8FAFC;--text-muted:#94A3B8;--shadow-elevation:0 4px 20px rgba(0,0,0,0.4)}
*{margin:0;padding:0;box-sizing:border-box}
body{background-color:var(--app-bg);color:var(--text-main);display:flex;flex-direction:column;height:100vh;overflow:hidden;font-family:Poppins,sans-serif}
#ambient-canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;pointer-events:none}
.unified-workspace-header{background-color:rgba(15,23,42,0.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.08);padding:0.6rem 1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:nowrap;gap:1.5rem;box-shadow:var(--shadow-elevation);z-index:100;flex-shrink:0}
.header-left-group{display:flex;align-items:center;gap:1rem;flex-shrink:0}
.back-btn{background-color:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.15);padding:0.4rem 1.2rem;border-radius:6px;cursor:pointer;font-weight:500;font-size:0.9rem;display:flex;align-items:center;gap:0.4rem;transition:all 0.2s ease;white-space:nowrap}
.back-btn:hover{background-color:rgba(255,255,255,0.2);border-color:rgba(255,255,255,0.3);transform:translateY(-1px)}
.header-right-group{display:flex;align-items:center;gap:0.6rem;flex-shrink:0;justify-content:flex-end;flex-grow:1}
.app-btn{background-color:var(--primary-blue);color:#fff;border:none;padding:0.4rem 1.1rem;border-radius:6px;cursor:pointer;font-weight:500;font-size:0.9rem;display:flex;align-items:center;gap:0.4rem;transition:all 0.2s ease;white-space:nowrap}
.app-btn:hover{background-color:var(--primary-blue-hover);transform:translateY(-1px)}
.mobile-timer,.mobile-eyes{display:none!important}
.hide-on-mobile{display:flex}
.main-content{flex-grow:1;position:relative;width:100%;z-index:10;padding:2rem;display:flex;align-items:center;justify-content:center;overflow:hidden}
.video-container{width:100%;max-width:1100px;aspect-ratio:16/9;border-radius:12px;overflow:hidden;box-shadow:var(--shadow-elevation);border:1px solid var(--border-color);background:#000}
.video-container iframe{width:100%;height:100%;border:none}
.unified-workspace-footer{background-color:rgba(15,23,42,0.85);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,0.08);padding:0.6rem 1.5rem;display:flex;justify-content:space-between;align-items:center;z-index:100;flex-shrink:0;font-size:0.85rem;box-shadow:0 -4px 20px rgba(0,0,0,0.4)}
.footer-tools{display:flex;align-items:center;gap:1.2rem}
.motivation-text{color:var(--text-main);font-weight:500}
.timer-display{font-family:Poppins,monospace;font-weight:600;font-size:1rem;color:var(--text-main);background-color:rgba(255,255,255,0.05);padding:0.2rem 0.8rem;border-radius:4px;border:1px solid rgba(255,255,255,0.1)}
.tracking-eyes-container{--eye-size:20px;--pupil-size:calc(var(--eye-size) * 0.4);--border-width:calc(var(--eye-size) * 0.07);--eye-gap:calc(var(--eye-size) * 0.25);display:inline-flex;gap:var(--eye-gap)}
.eye-ball{width:var(--eye-size);height:var(--eye-size);background:#fff;border-radius:50%;border:var(--border-width) solid var(--app-bg);position:relative;overflow:hidden;transition:transform 0.1s linear}
.eye-ball::before{content:'';position:absolute;top:10%;left:12%;width:25%;height:12%;background:rgba(255,255,255,0.8);border-radius:50%;z-index:2}
.pupil{width:var(--pupil-size);height:var(--pupil-size);background:var(--app-bg);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
@media(max-width:850px){
.unified-workspace-footer{display:none!important}
.unified-workspace-header{padding:0.5rem 0.6rem;gap:0.5rem;background-color:#051024}
.hide-on-mobile{display:none!important}
.header-left-group{gap:0.4rem}
.header-right-group{gap:0.4rem;flex-grow:1}
.app-btn,.back-btn{font-size:0;padding:0;width:38px;height:38px;border-radius:8px;justify-content:center}
.app-btn svg,.back-btn svg{width:18px;height:18px}
.mobile-timer{display:block!important;font-size:0.85rem;padding:0.25rem 0.6rem;background-color:rgba(255,255,255,0.08);border:none;border-radius:6px;margin-left:0.5rem}
.mobile-eyes{display:inline-flex!important;--eye-size:18px}
.main-content{padding:1rem}
}
</style>
</head>
<body>
<canvas id="ambient-canvas"></canvas>
<header class="unified-workspace-header" role="banner">
<div class="header-left-group">
<button class="back-btn" onclick="window.location.href='../../../index.html'" aria-label="Go Back">
<svg fill="none" height="18" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" viewBox="0 0 24 24" width="18"><polyline points="15 18 9 12 15 6"></polyline></svg>
Back
</button>
</div>
<div class="header-right-group">
<button class="app-btn hide-on-mobile" onclick="toggleFullScreen()">
<svg fill="none" height="15" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="15"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
Fullscreen
</button>
<div class="timer-display timer-sync mobile-timer">00:00:00</div>
<div class="tracking-eyes-container mobile-eyes">
<div class="eye-ball"><div class="pupil"></div></div>
<div class="eye-ball"><div class="pupil"></div></div>
</div>
</div>
</header>

<main class="main-content">
<div class="video-container" id="viewer-container">
<iframe id="video-frame" src="https://www.youtube-nocookie.com/embed/wGfnxleqNJc?si=ZkVr-qKMTT6dMftY" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</div>
</main>

<footer class="unified-workspace-footer">
<div>© <span id="current-year">2026</span> SinghClasses.in</div>
<div class="footer-tools">
<span id="motivation-text" class="motivation-text">Best of luck!</span>
<div class="timer-display timer-sync" id="study-timer">00:00:00</div>
<div class="tracking-eyes-container desktop-eyes">
<div class="eye-ball"><div class="pupil"></div></div>
<div class="eye-ball"><div class="pupil"></div></div>
</div>
</div>
</footer>

<script>
let studySeconds=0;
const motivationEl=document.getElementById('motivation-text');
document.addEventListener("DOMContentLoaded",()=>{initCanvasParticles();initTrackingEyes();});
function toggleFullScreen(){if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(err=>console.error(`Error: ${err.message}`));}else{document.exitFullscreen();}}
function updateTimer(){studySeconds++;const hrs=Math.floor(studySeconds/3600).toString().padStart(2,'0');const mins=Math.floor((studySeconds%3600)/60).toString().padStart(2,'0');const secs=(studySeconds%60).toString().padStart(2,'0');const timeString=`${hrs}:${mins}:${secs}`;const timerElement=document.getElementById('study-timer');const mobTimer=document.querySelector('.mobile-timer');if(timerElement)timerElement.textContent=timeString;if(mobTimer)mobTimer.textContent=timeString;if(motivationEl){if(studySeconds===60)motivationEl.textContent="Warming up! 🔥";else if(studySeconds===300)motivationEl.textContent="Great focus! 🧠";else if(studySeconds===600)motivationEl.textContent="10 minutes in! ⭐";else if(studySeconds===1200)motivationEl.textContent="20 mins! Keep going! 💪";else if(studySeconds===1800)motivationEl.textContent="Half an hour! ⚡";else if(studySeconds===2700)motivationEl.textContent="45 mins! 🎯";else if(studySeconds===3600)motivationEl.textContent="1 Hour! Stretch! 🧘‍♂️";}}
setInterval(updateTimer,1000);
function initTrackingEyes(){document.querySelectorAll('.tracking-eyes-container').forEach(container=>{const eyes=container.querySelectorAll('.eye-ball');const pupils=container.querySelectorAll('.pupil');document.addEventListener('mousemove',(e)=>{eyes.forEach((eye,index)=>{const pupil=pupils[index];if(!pupil)return;const rect=eye.getBoundingClientRect();const cx=rect.left+rect.width/2;const cy=rect.top+rect.height/2;const dx=e.clientX-cx;const dy=e.clientY-cy;const angle=Math.atan2(dy,dx);const maxRadius=(rect.width/2)-(pupil.offsetWidth/2)-1.5;const distance=Math.min(Math.hypot(dx,dy)/10,maxRadius);pupil.style.transform=`translate(calc(-50% + ${Math.cos(angle)*distance}px), calc(-50% + ${Math.sin(angle)*distance}px))`;});});const blink=()=>{eyes.forEach(eye=>{eye.style.transform='scaleY(0.06)';setTimeout(()=>{eye.style.transform='scaleY(1)';},110);});};const scheduleBlink=()=>{setTimeout(()=>{blink();scheduleBlink();},3000+Math.random()*4000);};scheduleBlink();});}
function initCanvasParticles(){const canvas=document.getElementById('ambient-canvas');if(!canvas)return;const ctx=canvas.getContext('2d');let width,height,particles=[];function resize(){width=canvas.width=window.innerWidth;height=canvas.height=window.innerHeight;}window.addEventListener('resize',resize);resize();for(let i=0;i<25;i++){particles.push({x:Math.random()*width,y:Math.random()*height,vx:(Math.random()-0.5)*0.4,vy:(Math.random()-0.5)*0.4,r:Math.random()*1.5+0.5});}function draw(){ctx.clearRect(0,0,width,height);ctx.fillStyle='rgba(255,255,255,0.4)';particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=width;if(p.x>width)p.x=0;if(p.y<0)p.y=height;if(p.y>height)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();});requestAnimationFrame(draw);}draw();}
</script>
</body>
</html>
